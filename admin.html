<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeonTube - Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="brand">Creator Studio</div>
    <div class="header-right">
      <a href="index.html" class="btn btn-outline">Back to Feed</a>
    </div>
  </header>

  <div class="studio-container">
    
    <div id="main-admin-panel" class="panel-section" style="display: none; border-color: var(--accent-pink);">
      <h2 style="color: var(--accent-pink); margin-bottom: 15px;">Admin Requests</h2>
      <div id="request-list"><p class="uploader-info">Loading requests...</p></div>
    </div>

    <div class="panel-section">
      <h2 style="color: var(--accent-cyan); margin-bottom: 15px;">Upload New Content</h2>
      <input type="text" id="post-heading" class="input-field" placeholder="Enter Post Heading...">
      <input type="file" id="file-input" class="input-field" accept="image/*,video/*">
      <textarea id="post-caption" class="input-field" rows="4" placeholder="Write paragraph/caption..."></textarea>
      
      <button id="upload-btn" class="btn btn-cyan" style="width: 100%;">Upload to NeonTube</button>
      <p id="status" style="margin-top: 15px; text-align: center; font-weight: bold;"></p>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyApS9a6cxv7O0LMARD7IKOr-WEQAtlq9fI",
      authDomain: "mydata-81da6.firebaseapp.com",
      projectId: "mydata-81da6",
      storageBucket: "mydata-81da6.firebasestorage.app",
      messagingSenderId: "577099961634",
      appId: "1:577099961634:web:7a37609ea325d67146417b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const currentUser = localStorage.getItem('nt_user');
    const currentRole = localStorage.getItem('nt_role');

    // Authentication Check
    if(!currentUser || currentRole === 'user') {
      document.body.innerHTML = "<h1 style='text-align:center; margin-top:50px; color:red;'>Access Denied! You are not an admin.</h1>";
    }

    // Main Admin Features
    if(currentRole === 'main_admin') {
      document.getElementById('main-admin-panel').style.display = 'block';
      loadAdminRequests();
    }

    async function loadAdminRequests() {
      const list = document.getElementById('request-list');
      const snap = await getDocs(collection(db, "users"));
      list.innerHTML = "";
      let found = false;

      snap.forEach(uDoc => {
        let u = uDoc.data();
        if(u.requestAdmin === true && u.role === 'user') {
          found = true;
          list.innerHTML += `
            <div class="admin-list-item" style="align-items:center;">
              <span><strong>${uDoc.id}</strong> wants to be an admin.</span>
              <button class="btn btn-cyan" onclick="approveAdmin('${uDoc.id}')">Approve</button>
            </div>
          `;
        }
      });
      if(!found) list.innerHTML = "<p style='color:gray;'>No pending requests.</p>";
    }

    window.approveAdmin = async function(username) {
      await updateDoc(doc(db, "users", username), { role: 'admin', requestAdmin: false });
      alert(`${username} is now an Admin!`);
      loadAdminRequests();
    }

    // Upload Logic
    const CLOUD_NAME = "docif5nym"; 
    const UPLOAD_PRESET = "my_preset"; 

    document.getElementById('upload-btn').addEventListener('click', async () => {
      const heading = document.getElementById('post-heading').value.trim();
      const caption = document.getElementById('post-caption').value.trim();
      const fileInput = document.getElementById('file-input');
      const status = document.getElementById('status');

      if(!heading || fileInput.files.length === 0) {
        return status.innerText = "Heading and File are required!";
      }

      const file = fileInput.files[0];
      status.style.color = "var(--accent-cyan)";
      status.innerText = "Uploading to Server...";

      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', UPLOAD_PRESET);

      try {
        const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: 'POST', body: formData });
        const data = await response.json();

        if(data.secure_url) {
          status.innerText = "Saving data...";
          await addDoc(collection(db, "posts"), {
            heading: heading,
            caption: caption,
            fileUrl: data.secure_url,
            fileType: file.type,
            uploaderName: currentUser,
            reactions: { '👍':0, '❤️':0, '😂':0, '😲':0, '😢':0 },
            userReactions: {},
            comments: [],
            createdAt: Date.now()
          });

          status.style.color = "#22c55e";
          status.innerText = "Upload Successful!";
          document.getElementById('post-heading').value = "";
          document.getElementById('post-caption').value = "";
          fileInput.value = "";
        }
      } catch (e) {
        status.style.color = "#ef4444";
        status.innerText = "Upload Failed!";
      }
    });
  </script>
</body>
</html>
