<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="brand">Studio</div>
    <div class="header-right">
      <a href="index.html" class="btn btn-outline">Back to Home</a>
    </div>
  </header>

  <div class="wall-container">
    
    <!-- Main Admin Only Sections -->
    <div id="main-admin-panel" style="display: none;">
      
      <div class="post-card" style="padding: 20px; border-left: 5px solid var(--admin-color);">
        <h3 style="margin-bottom: 15px;">Pending Approvals</h3>
        <div id="request-list" style="font-size: 14px; color: var(--text-muted);">Loading requests...</div>
      </div>

      <div class="post-card" style="padding: 20px; border-left: 5px solid var(--chief-color);">
        <h3 style="margin-bottom: 15px;">Create Category</h3>
        <div style="display: flex; gap: 10px;">
          <input type="text" id="new-category" class="custom-input" style="margin-bottom: 0;" placeholder="Category Name...">
          <button id="add-category-btn" class="btn btn-primary">Add</button>
        </div>
      </div>
    </div>

    <!-- Upload Section -->
    <div class="post-card" style="padding: 25px;">
      <h3 style="margin-bottom: 20px; font-size: 20px;">Upload Content</h3>
      
      <input type="text" id="post-heading" class="custom-input" placeholder="Title / Heading">
      <select id="post-category" class="custom-input">
        <option value="">Select Category...</option>
      </select>
      
      <div style="margin-bottom: 15px;">
        <label style="font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; display: block;">Select Media (Image/Video 4:6 recommended)</label>
        <input type="file" id="file-input" accept="image/*,video/*" style="width: 100%; padding: 12px; border: 2px dashed #cbd5e1; border-radius: 12px; background: #f8fafc; cursor: pointer;">
      </div>
      
      <textarea id="post-caption" rows="4" class="custom-input" placeholder="Write caption or description..." style="resize: vertical;"></textarea>
      
      <button id="upload-btn" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 16px;">Publish Post</button>
      <p id="status" style="margin-top: 15px; text-align: center; font-weight: 600; font-size: 14px;"></p>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyApS9a6cxv7O0LMARD7IKOr-WEQAtlq9fI",
      authDomain: "mydata-81da6.firebaseapp.com",
      projectId: "mydata-81da6",
      storageBucket: "mydata-81da6.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const currentUser = localStorage.getItem('nt_user');
    const currentRole = localStorage.getItem('nt_role');

    if(!currentUser || currentRole === 'user') {
      document.body.innerHTML = "<div style='display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; gap:20px;'><h2 style='color:#ef4444;'>Access Denied!</h2><a href='index.html' class='btn btn-primary'>Go Back</a></div>";
    }

    if(currentRole === 'main_admin') {
      document.getElementById('main-admin-panel').style.display = 'block';
      loadRequests();
    }

    loadCategories();

    async function loadRequests() {
      const list = document.getElementById('request-list');
      const snap = await getDocs(collection(db, "users"));
      list.innerHTML = ""; let found = false;
      snap.forEach(uDoc => {
        let u = uDoc.data();
        if(u.requestAdmin === true && u.role === 'user') {
          found = true;
          list.innerHTML += `
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f8fafc; border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border-color);">
              <span style="font-weight:600; color:var(--text-main);">${uDoc.id}</span>
              <button class="btn btn-outline" style="padding: 6px 12px; font-size: 12px;" onclick="approveAdmin('${uDoc.id}')">Approve</button>
            </div>
          `;
        }
      });
      if(!found) list.innerHTML = "No pending requests.";
    }

    window.approveAdmin = async function(username) {
      await updateDoc(doc(db, "users", username), { role: 'admin', requestAdmin: false });
      alert(`${username} is now an Admin!`); loadRequests();
    }

    document.getElementById('add-category-btn').addEventListener('click', async () => {
      const cat = document.getElementById('new-category').value.trim();
      if(!cat) return;
      await setDoc(doc(db, "categories", cat), { createdBy: currentUser });
      document.getElementById('new-category').value = ""; loadCategories(); alert("Category Added!");
    });

    async function loadCategories() {
      const select = document.getElementById('post-category');
      select.innerHTML = '<option value="">Select Category...</option>';
      const snap = await getDocs(collection(db, "categories"));
      snap.forEach(doc => { select.innerHTML += `<option value="${doc.id}">${doc.id}</option>`; });
    }

    const CLOUD_NAME = "docif5nym"; const UPLOAD_PRESET = "my_preset"; 

    document.getElementById('upload-btn').addEventListener('click', async () => {
      const heading = document.getElementById('post-heading').value.trim();
      const caption = document.getElementById('post-caption').value.trim();
      const category = document.getElementById('post-category').value;
      const fileInput = document.getElementById('file-input');
      const status = document.getElementById('status');

      if(!heading || !category || fileInput.files.length === 0) {
        status.style.color = "#ef4444"; status.innerText = "Heading, Category & File are required!"; return;
      }

      const file = fileInput.files[0];
      status.style.color = "#3b82f6"; status.innerText = "Uploading to server... Please wait.";
      const btn = document.getElementById('upload-btn'); btn.innerText = "Uploading..."; btn.disabled = true;

      const formData = new FormData(); formData.append('file', file); formData.append('upload_preset', UPLOAD_PRESET);

      try {
        const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: 'POST', body: formData });
        const data = await response.json();

        if(data.secure_url) {
          status.innerText = "Saving to Database...";
          await addDoc(collection(db, "posts"), {
            heading: heading, caption: caption, category: category, fileUrl: data.secure_url, fileType: file.type,
            uploaderName: currentUser, reactions: { '👍':0, '❤️':0, '🔥':0, '😂':0, '😲':0 }, userReactions: {}, comments: [], createdAt: Date.now()
          });

          status.style.color = "#10b981"; status.innerText = "🎉 Uploaded Successfully!";
          document.getElementById('post-heading').value = ""; document.getElementById('post-caption').value = "";
          document.getElementById('post-category').value = ""; fileInput.value = "";
        }
      } catch (e) {
        status.style.color = "#ef4444"; status.innerText = "Upload Failed! Check network.";
      }
      btn.innerText = "Publish Post"; btn.disabled = false;
    });
  </script>
</body>
</html>
