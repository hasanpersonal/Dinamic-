<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="brand">Creator Studio</div>
    <div class="header-right">
      <a href="index.html" class="btn btn-outline">Back to Feed</a>
    </div>
  </header>

  <div class="wall-container">
    
    <div id="main-admin-panel" class="admin-box" style="display: none; border-left: 4px solid var(--admin-color);">
      <h2 style="color: var(--admin-color); margin-bottom: 15px;">Pending Admin Requests</h2>
      <div id="request-list"><p class="uploader-info">Loading requests...</p></div>
    </div>

    <div class="admin-box">
      <h2 style="color: var(--primary-color); margin-bottom: 15px;">Upload Content</h2>
      
      <input type="text" id="post-heading" class="input-field" placeholder="Post Heading...">
      <input type="file" id="file-input" class="input-field" accept="image/*,video/*" style="background: white;">
      <textarea id="post-caption" class="input-field" rows="4" placeholder="Write Paragraph/Caption..."></textarea>
      
      <button id="upload-btn" class="btn btn-primary" style="width: 100%;">Upload Post</button>
      <p id="status" style="margin-top: 15px; text-align: center; font-weight: bold;"></p>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyApS9a6cxv7O0LMARD7IKOr-WEQAtlq9fI",
      authDomain: "mydata-81da6.firebaseapp.com",
      projectId: "mydata-81da6",
      storageBucket: "mydata-81da6.firebasestorage.app",
      messagingSenderId: "577099961634",
      appId: "1:577099961634:web:7a37609ea325d67146417b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const currentUser = localStorage.getItem('nt_user');
    const currentRole = localStorage.getItem('nt_role');

    if(!currentUser || currentRole === 'user') {
      document.body.innerHTML = "<h2 style='text-align:center; padding: 50px; color:red;'>Access Denied! Go back to Feed.</h2>";
    }

    if(currentRole === 'main_admin') {
      document.getElementById('main-admin-panel').style.display = 'block';
      loadRequests();
    }

    async function loadRequests() {
      const list = document.getElementById('request-list');
      const snap = await getDocs(collection(db, "users"));
      list.innerHTML = "";
      let found = false;

      snap.forEach(uDoc => {
        let u = uDoc.data();
        if(u.requestAdmin === true && u.role === 'user') {
          found = true;
          list.innerHTML += `
            <div class="admin-list-item">
              <span><strong>${uDoc.id}</strong> wants to be an Admin.</span>
              <button class="btn btn-primary" onclick="approveAdmin('${uDoc.id}')">Approve</button>
            </div>
          `;
        }
      });
      if(!found) list.innerHTML = "<p style='color:var(--text-muted);'>No pending requests.</p>";
    }

    window.approveAdmin = async function(username) {
      await updateDoc(doc(db, "users", username), { role: 'admin', requestAdmin: false });
      alert(`${username} is now an Admin!`);
      loadRequests();
    }

    // Cloudinary Upload
    const CLOUD_NAME = "docif5nym"; 
    const UPLOAD_PRESET = "my_preset"; 

    document.getElementById('upload-btn').addEventListener('click', async () => {
      const heading = document.getElementById('post-heading').value.trim();
      const caption = document.getElementById('post-caption').value.trim();
      const fileInput = document.getElementById('file-input');
      const status = document.getElementById('status');

      if(!heading || fileInput.files.length === 0) return status.innerText = "Heading & File required!";

      const file = fileInput.files[0];
      status.style.color = "var(--primary-color)";
      status.innerText = "Uploading... Please wait.";

      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', UPLOAD_PRESET);

      try {
        const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: 'POST', body: formData });
        const data = await response.json();

        if(data.secure_url) {
          status.innerText = "Saving to Database...";
          await addDoc(collection(db, "posts"), {
            heading: heading,
            caption: caption,
            fileUrl: data.secure_url,
            fileType: file.type,
            uploaderName: currentUser,
            reactions: { '👍':0, '❤️':0, '😂':0, '😲':0, '😢':0 },
            userReactions: {},
            comments: [],
            createdAt: Date.now()
          });

          status.style.color = "green";
          status.innerText = "Uploaded Successfully!";
          document.getElementById('post-heading').value = "";
          document.getElementById('post-caption').value = "";
          fileInput.value = "";
        }
      } catch (e) {
        status.style.color = "red";
        status.innerText = "Upload Failed!";
      }
    });
  </script>
</body>
</html>
