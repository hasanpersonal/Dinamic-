<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Studio Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="toast-container"></div>

  <header>
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; color: #8b5cf6;"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Studio Pro
    </div>
    <div class="header-right">
      <a href="index.html" class="btn btn-outline">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:5px;"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Return Home
      </a>
    </div>
  </header>

  <div class="wall-container">
    
    <!-- Main Admin Exclusives (Approval & Categories) -->
    <div id="main-admin-panel" style="display: none; margin-bottom: 30px;">
      
      <!-- Pending Requests Box -->
      <div class="post-card" style="padding: 25px; border-left: 6px solid var(--admin-color);">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom: 15px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--admin-color);"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>
          <h3 style="font-size: 18px; font-weight:800;">Pending Approvals</h3>
        </div>
        <div id="request-list" style="max-height: 200px; overflow-y: auto;">
          <div class="skeleton skeleton-text"></div>
        </div>
      </div>

      <!-- Category Creator Box -->
      <div class="post-card" style="padding: 25px; border-left: 6px solid var(--chief-color);">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom: 15px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--chief-color);"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
          <h3 style="font-size: 18px; font-weight:800;">Taxonomy Manager</h3>
        </div>
        <div style="display: flex; gap: 12px;">
          <input type="text" id="new-category" class="custom-input" style="margin-bottom: 0; flex: 1;" placeholder="Define new category ID...">
          <button id="add-category-btn" class="btn btn-primary" style="white-space: nowrap;">Inject Category</button>
        </div>
      </div>
    </div>

    <!-- Universal Upload Engine -->
    <div class="post-card" style="padding: 30px;">
      <div style="text-align: center; margin-bottom: 25px;">
        <div style="display:inline-block; background: #e0e7ff; color: #4f46e5; padding: 15px; border-radius: 50%; margin-bottom: 10px;">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <h2 style="font-size: 22px; font-weight: 800;">Content Publisher</h2>
        <p style="color: var(--text-muted); font-size: 14px;">Deploy new media directly to the global feed.</p>
      </div>
      
      <form id="upload-form" onsubmit="event.preventDefault();">
        <label style="font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; display: block;">Document Title</label>
        <input type="text" id="post-heading" class="custom-input" placeholder="Give your post a catchy title" required>
        
        <label style="font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; display: block;">Content Category</label>
        <div style="position: relative;">
          <select id="post-category" class="custom-input" style="appearance: none;" required>
            <option value="" disabled selected>System verifying taxonomy...</option>
          </select>
          <svg style="position:absolute; right:15px; top:18px; pointer-events:none; color:var(--text-muted);" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        
        <div style="margin-bottom: 20px; border: 2px dashed #cbd5e1; border-radius: 12px; padding: 25px 20px; text-align: center; background: #f8fafc; transition: 0.2s;" id="drop-zone">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color: #64748b; margin-bottom: 10px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <label style="font-size: 14px; font-weight: 700; color: var(--primary-color); display: block; cursor: pointer;">
            Click to browse files
            <input type="file" id="file-input" accept="image/*,video/*" style="display: none;" required>
          </label>
          <p style="font-size: 12px; color: var(--text-muted); margin-top: 5px;" id="file-name-display">Supported: Standard images & videos (Auto adjustable size)</p>
        </div>
        
        <label style="font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; display: block;">Rich Caption</label>
        <textarea id="post-caption" rows="5" class="custom-input" placeholder="Draft your detailed description here..." style="resize: vertical;"></textarea>
        
        <button id="upload-btn" type="submit" class="btn btn-primary" style="width: 100%; padding: 16px; font-size: 16px; font-weight: 800; border-radius: var(--radius-md);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          Initialize Deployment
        </button>
      </form>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyApS9a6cxv7O0LMARD7IKOr-WEQAtlq9fI",
      authDomain: "mydata-81da6.firebaseapp.com",
      projectId: "mydata-81da6",
      storageBucket: "mydata-81da6.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const currentUser = localStorage.getItem('nt_user');
    const currentRole = localStorage.getItem('nt_role');

    // Security Gatekeeper
    if(!currentUser || currentRole === 'user') {
      document.body.innerHTML = `
        <div style='display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; gap:20px; text-align:center; padding: 20px;'>
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: #ef4444;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <h2 style='color:var(--primary-color); font-weight:800; font-size: 28px;'>Security Breach Logged</h2>
          <p style="color: var(--text-muted);">You lack the necessary cryptographic clearance for this terminal.</p>
          <a href='index.html' class='btn btn-primary' style="margin-top: 20px;">Abort to Safe Zone</a>
        </div>`;
      throw new Error("Unauthorized access prevented.");
    }

    // Toast functionality
    window.showToast = function(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => { if(container.contains(toast)) toast.remove(); }, 3500);
    }

    // UI Enhancements
    document.getElementById('file-input').addEventListener('change', function(e) {
      const display = document.getElementById('file-name-display');
      if(this.files && this.files.length > 0) {
        const file = this.files[0];
        display.innerHTML = `<span style="color:var(--primary-color); font-weight:700;">${file.name}</span> (${(file.size/1024/1024).toFixed(2)} MB)`;
        document.getElementById('drop-zone').style.borderColor = "#10b981";
        document.getElementById('drop-zone').style.backgroundColor = "#d1fae5";
      } else {
        display.innerHTML = "Supported: Standard images & videos (4:6 optimal)";
        document.getElementById('drop-zone').style.borderColor = "#cbd5e1";
        document.getElementById('drop-zone').style.backgroundColor = "#f8fafc";
      }
    });

    // Populate Categories Dropdown
    async function initTaxonomy() {
      const select = document.getElementById('post-category');
      try {
        const snap = await getDocs(collection(db, "categories"));
        select.innerHTML = '<option value="" disabled selected>Select appropriate category</option>';
        snap.forEach(d => { select.innerHTML += `<option value="${d.id}">${d.id}</option>`; });
      } catch (e) {
        select.innerHTML = '<option value="" disabled selected>Taxonomy fetch failed</option>';
      }
    }
    initTaxonomy();

    // Chief Admin Privileges Array
    if(currentRole === 'main_admin') {
      document.getElementById('main-admin-panel').style.display = 'block';
      loadAdminRequests();

      // Category Injection Logic
      document.getElementById('add-category-btn').addEventListener('click', async () => {
        const nc = document.getElementById('new-category').value.trim();
        const btn = document.getElementById('add-category-btn');
        if(nc) {
          try {
            btn.disabled = true; btn.innerText = "Processing...";
            await setDoc(doc(db, "categories", nc), { name: nc });
            document.getElementById('new-category').value = "";
            showToast(`Category [${nc}] deployed globally.`, "success");
            initTaxonomy(); 
          } catch(e) {
            showToast("Failed to inject category.", "error");
          } finally {
            btn.disabled = false; btn.innerText = "Inject Category";
          }
        }
      });
    }

    async function loadAdminRequests() {
      const list = document.getElementById('request-list');
      try {
        const snap = await getDocs(collection(db, "users"));
        let html = "";
        snap.forEach(d => {
          let u = d.data();
          if(u.requestAdmin && u.role === 'user') {
            html += `
              <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; background:#f8fafc; margin-bottom:10px; border-radius:8px; border:1px solid #e2e8f0;">
                <div style="display:flex; align-items:center; gap:10px;">
                   <div style="width:30px; height:30px; background:var(--primary-color); color:white; border-radius:50%; display:flex; justify-content:center; align-items:center; font-size:12px; font-weight:700;">${d.id.charAt(0).toUpperCase()}</div>
                   <span style="font-weight:700; color:var(--primary-color);">${d.id}</span>
                </div>
                <button class="btn btn-outline" style="padding: 6px 12px; font-size:12px; border-color:var(--admin-color); color:var(--admin-color);" onclick="grantAdmin('${d.id}')">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;"><polyline points="20 6 9 17 4 12"/></svg>
                  Approve
                </button>
              </div>`;
          }
        });
        list.innerHTML = html || "<p style='color:var(--text-muted); font-size:14px; text-align:center; padding: 20px 0;'>System nominal. No pending requests.</p>";
      } catch(e) {
        list.innerHTML = "<p style='color:red;'>Failed to pull request ledger.</p>";
      }
    }

    // Globally attached for button onclick
    window.grantAdmin = async function(uid) {
      try {
        await updateDoc(doc(db, "users", uid), { role: 'admin', requestAdmin: false });
        showToast(`Elevation granted. [${uid}] is now Admin.`, "success");
        loadAdminRequests();
      } catch(e) {
        showToast("Elevation command rejected.", "error");
      }
    }

    // CLOUDINARY UPLOAD PIPELINE
    const CLOUD_NAME = "docif5nym";
    const UPLOAD_PRESET = "My_preset";

    document.getElementById('upload-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const file = document.getElementById('file-input').files[0];
      const heading = document.getElementById('post-heading').value.trim();
      const category = document.getElementById('post-category').value;
      const caption = document.getElementById('post-caption').value.trim();
      const btn = document.getElementById('upload-btn');
      
      if(!file || !heading || !category) {
        showToast("Missing critical deployment parameters.", "error");
        return;
      }

      btn.disabled = true;
      btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation: spin 1s linear infinite;"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg> Uploading via Secure Pipeline...`;

      try {
        // Step 1: Push to Cloudinary Network
        let type = file.type.startsWith('video/') ? 'video' : 'image';
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);

        const cloudinaryRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${type}/upload`, {
          method: "POST",
          body: formData
        });

        const cloudData = await cloudinaryRes.json();
        if(!cloudData.secure_url) throw new Error("Cloudinary handshake failed.");

        // Step 2: Push Meta to Firebase Core
        await addDoc(collection(db, "posts"), {
          heading: heading,
          category: category,
          caption: caption,
          fileUrl: cloudData.secure_url,
          fileType: file.type,
          uploaderName: currentUser,
          reactions: { '👍':0, '❤️':0, '🔥':0, '💀':0, },
          userReactions: {},
          comments: [],
          createdAt: Date.now()
        });

        showToast("Payload successfully deployed to global feed!", "success");
        document.getElementById('upload-form').reset();
        document.getElementById('file-name-display').innerHTML = "Supported: Standard images & videos (Auto adjustable size)";
        document.getElementById('drop-zone').style.borderColor = "#cbd5e1";
        document.getElementById('drop-zone').style.backgroundColor = "#f8fafc";
        
      } catch (err) {
        console.error("Pipeline Error:", err);
        showToast("Deployment failed! Server connection interrupted.", "error");
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Initialize Deployment`;
      }
    });
  </script>
</body>
</html>
