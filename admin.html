<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

  <header>
    <div class="header-logo">
      <i class="fa-solid fa-video logo-icon"></i>
      <h1>Creator Studio</h1>
    </div>
    <a href="index.html" class="btn outline-btn"><i class="fa-solid fa-arrow-left"></i> View Site</a>
  </header>

  <div class="studio-container">
    <div id="login-box" class="premium-card">
      <h2><i class="fa-solid fa-lock"></i> Admin Authentication</h2>
      <p class="subtitle">Enter your studio credentials</p>
      <input type="password" id="admin-password" class="premium-input" placeholder="Password (admin123)">
      <button id="login-btn" class="btn primary-btn full-width"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
      <p id="login-error" class="error-text" style="display:none;">Access Denied. Incorrect Password.</p>
    </div>

    <div id="admin-panel" style="display: none;">
      <div class="premium-card mb-20">
        <h2><i class="fa-solid fa-cloud-arrow-up"></i> Upload Media</h2>
        
        <div class="upload-area">
          <input type="file" id="file-input" accept="image/*,video/*" class="file-input-custom">
        </div>
        
        <textarea id="caption-input" class="premium-input" placeholder="Write an engaging title or caption..." rows="3"></textarea>
        <button id="upload-btn" class="btn primary-btn full-width"><i class="fa-solid fa-upload"></i> Publish to Feed</button>
        <p id="status" class="status-msg"></p>
      </div>
      
      <div class="premium-card">
        <h2><i class="fa-solid fa-list"></i> Manage Content</h2>
        <div id="admin-feed" class="manage-list">
          <p class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Loading your videos/images...</p>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyApS9a6cxv7O0LMARD7IKOr-WEQAtlq9fI",
      authDomain: "mydata-81da6.firebaseapp.com",
      projectId: "mydata-81da6",
      storageBucket: "mydata-81da6.firebasestorage.app",
      messagingSenderId: "577099961634",
      appId: "1:577099961634:web:7a37609ea325d67146417b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const CLOUD_NAME = "docif5nym"; 
    const UPLOAD_PRESET = "my_preset"; 

    // Login
    document.getElementById('login-btn').addEventListener('click', () => {
      if(document.getElementById('admin-password').value === "admin123") { 
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        loadAdminFeed();
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    });

    // Upload
    document.getElementById('upload-btn').addEventListener('click', async () => {
      const fileInput = document.getElementById('file-input');
      const status = document.getElementById('status');

      if(fileInput.files.length === 0) {
        status.innerHTML = "<span class='error-text'>Please select a file first.</span>";
        return;
      }

      const file = fileInput.files[0];
      status.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Uploading securely...";
      status.style.color = "#3ea6ff";

      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', UPLOAD_PRESET);

      try {
        const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: 'POST', body: formData });
        const data = await response.json();

        if(data.secure_url) {
          status.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Syncing with database...";
          await addDoc(collection(db, "posts"), {
            fileUrl: data.secure_url,
            fileType: file.type,
            caption: document.getElementById('caption-input').value,
            likedUsers: [],
            comments: [],
            createdAt: Date.now()
          });

          status.innerHTML = "<span class='success-text'><i class='fa-solid fa-check-circle'></i> Upload Successful!</span>";
          fileInput.value = "";
          document.getElementById('caption-input').value = "";
          loadAdminFeed();
        }
      } catch (error) {
        status.innerHTML = "<span class='error-text'><i class='fa-solid fa-circle-exclamation'></i> Upload Failed.</span>";
      }
    });

    // Manage/Delete Feed
    async function loadAdminFeed() {
      const adminFeed = document.getElementById('admin-feed');
      try {
        const snapshot = await getDocs(collection(db, "posts"));
        adminFeed.innerHTML = "";
        if(snapshot.empty) { adminFeed.innerHTML = "<p>No content uploaded yet.</p>"; return; }

        snapshot.forEach(docData => {
          const post = docData.data();
          const item = document.createElement('div');
          item.className = "manage-item";
          item.innerHTML = `
            <div class="manage-info">
              <i class="fa-solid ${post.fileType?.startsWith('video') ? 'fa-video' : 'fa-image'}"></i>
              <span>${post.caption || 'Untitled Media'}</span>
            </div>
            <button class="btn delete-btn" data-id="${docData.id}"><i class="fa-solid fa-trash"></i></button>
          `;
          adminFeed.appendChild(item);
        });

        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            if(confirm("Permanently delete this post?")) {
              const btnEl = e.currentTarget;
              const id = btnEl.getAttribute('data-id');
              btnEl.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i>";
              await deleteDoc(doc(db, "posts", id));
              loadAdminFeed();
            }
          });
        });
      } catch(err) { adminFeed.innerHTML = "<p>Error loading content.</p>"; }
    }
  </script>
</body>
</html>
