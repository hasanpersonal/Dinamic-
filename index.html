<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A premium content sharing platform.">
  <title>Home | Content Platform</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    :root {
      --bg-color: #f3f4f6; --card-bg: #ffffff; --primary-color: #0f1419; --primary-hover: #272c30;
      --text-main: #0f1419; --text-muted: #536471; --text-light: #94a3b8;
      --admin-color: #10b981; --admin-bg: #d1fae5; --admin-border: #a7f3d0;
      --chief-color: #f97316; --chief-bg: #ffedd5; --chief-border: #fed7aa;
      --user-bg: #f3f4f6; --user-border: #e2e8f0;
      --border-color: #eff3f4; --hover-bg: #e7e7e8; --danger-color: #ef4444; 
      --danger-bg: #fee2e2; --danger-border: #fecaca; --success-color: #10b981;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1); --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
      --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px;
      --transition-fast: 0.15s ease-in-out;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.4; -webkit-font-smoothing: antialiased; font-size: 13px; }

    header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
    .brand { font-size: 18px; font-weight: 800; color: var(--primary-color); letter-spacing: -0.5px; }
    .gradient-text { background: linear-gradient(90deg, #1d4ed8, #9333ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .badge { padding: 4px 8px; border-radius: var(--radius-md); font-size: 10px; font-weight: 700; display: inline-flex; align-items: center; gap: 3px; text-transform: uppercase; }
    .badge-main_admin { background: var(--chief-bg); color: var(--chief-color); border: 1px solid var(--chief-border); }
    .badge-admin { background: var(--admin-bg); color: var(--admin-color); border: 1px solid var(--admin-border); }
    .badge-user { background: var(--user-bg); color: var(--text-muted); border: 1px solid var(--user-border); }

    .user-avatar { background: #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #334155; font-size: 13px; border: 2px solid transparent; transition: var(--transition-fast); }

    .btn { padding: 10px 14px; border: none; border-radius: var(--radius-xl); cursor: pointer; font-weight: 600; font-size: 12px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: var(--transition-fast); }
    .btn-primary { background: var(--primary-color); color: white; }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-outline { border: 1px solid var(--border-color); color: var(--text-main); background: white; }
    .btn-outline:hover { background: var(--bg-color); }
    .btn-danger { background: var(--danger-bg); color: var(--danger-color); border: 1px solid var(--danger-border);}

    .custom-input { width: 100%; padding: 10px 14px; border-radius: var(--radius-md); border: 1px solid var(--border-color); outline: none; font-size: 13px; background: #f9fafb; margin-bottom: 12px; color: var(--text-main); }
    .custom-input:focus { border-color: #94a3b8; background: white; box-shadow: 0 0 0 2px rgba(148, 163, 184, 0.2); }

    .wall-container { max-width: 500px; margin: 20px auto; padding: 0 12px; }
    .post-card { background: var(--card-bg); border-radius: var(--radius-lg); margin-bottom: 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); }

    .post-header-sec { padding: 14px; }
    .post-heading { font-size: 15px; font-weight: 800; margin-bottom: 4px; line-height: 1.2;}
    .category-tag { font-size: 10px; font-weight: 700; color: #4f46e5; background: #e0e7ff; padding: 3px 8px; border-radius: 6px; display: inline-block; margin-bottom: 6px; text-transform: uppercase;}
    .uploader-info { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px;}
    .uploader-name { color: var(--primary-color); font-weight: 700; }

    .post-media { width: 100%; background: #000; }
    .post-media img, .post-media video { width: 100%; aspect-ratio: 4 / 6; object-fit: cover; display: block; }
    .post-body { padding: 14px; }
    .post-caption { font-size: 13px; line-height: 1.5; margin-bottom: 14px; white-space: pre-wrap;}

    .action-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-top: 1px solid var(--border-color); padding-top: 14px; }
    .react-btn, .comment-toggle-btn { background: var(--bg-color); border: 1px solid transparent; padding: 6px 12px; border-radius: var(--radius-xl); cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-muted); display: flex; gap: 5px; align-items: center;}
    .react-btn.active { background: #dbeafe; color: #1e3a8a; border-color: #bfdbfe; }

    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 20, 25, 0.6); z-index: 1000; justify-content: center; align-items: center; padding: 15px; }
    .modal-content { background: white; border-radius: var(--radius-lg); width: 100%; max-width: 420px; display: flex; flex-direction: column; overflow: hidden; }
    .modal-header { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: #f8fafc; }
    .close-btn { font-size: 24px; cursor: pointer; color: var(--text-light); line-height: 1; border: none; background: transparent; padding: 0 5px; }

    .comments-container { overflow-y: auto; background: #fafafa; }
    .comment-item { margin-bottom: 10px; font-size: 12px; background: white; padding: 10px; border-radius: var(--radius-md); border: 1px solid var(--border-color); }
    .comment-author { font-weight: 800; font-size: 12px;}
    .comment-chief { color: var(--chief-color); } .comment-admin { color: var(--admin-color); } .comment-user { color: var(--text-main); }

    #toast-container { position: fixed; bottom: 15px; right: 15px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: white; padding: 12px 18px; border-radius: var(--radius-md); box-shadow: var(--shadow-md); font-weight: 600; font-size: 12px; border-left: 3px solid var(--primary-color); }
    .toast.success { border-left-color: var(--success-color); } .toast.error { border-left-color: var(--danger-color); }

    .skeleton { background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%); background-size: 200% 100%; animation: 1.5s shine-loader linear infinite; border-radius: 4px; }
    .skeleton-title { width: 60%; height: 18px; margin-bottom: 8px; } .skeleton-text { width: 100%; height: 12px; margin-bottom: 6px; } .skeleton-media { width: 100%; aspect-ratio: 4/6; }

    .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 15px; background: white;}
    .auth-box { width: 100%; max-width: 360px; text-align: center; }
    .profile-header { text-align: center; padding: 30px 15px; background: white; border-radius: var(--radius-lg); border: 1px solid var(--border-color); margin-bottom: 20px; box-shadow: var(--shadow-sm); }
    .profile-avatar-lg { width: 70px; height: 70px; border-radius: 50%; background: var(--bg-color); color: var(--text-muted); font-size: 28px; font-weight: 800; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; border: 3px solid white; box-shadow: var(--shadow-sm); }

    @keyframes shine-loader { to { background-position-x: -200%; } }
  </style>
</head>
<body>

  <div id="toast-container"></div>

  <div id="auth-screen" class="auth-wrapper">
    <div class="auth-box">
      <div style="margin-bottom: 15px;">
        <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #4f46e5;">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
      </div>
      <h1 class="brand gradient-text" style="font-size: 28px; margin-bottom: 10px;">Welcome Back</h1>
      <p style="color: var(--text-muted); margin-bottom: 25px; font-size: 14px;">Sign in to continue exploring</p>
      
      <div style="text-align: left;">
        <label style="font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; display: block;">Username</label>
        <input type="text" id="auth-username" class="custom-input" placeholder="Enter your username" autocomplete="off">
        
        <label style="font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; display: block;">Password</label>
        <input type="password" id="auth-password" class="custom-input" placeholder="Enter your password">
      </div>
      
      <div style="display: flex; gap: 12px; flex-direction: column; margin-top: 15px;">
        <button id="btn-login" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Login
        </button>
        <button id="btn-register" class="btn btn-outline">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          Create Account
        </button>
      </div>
    </div>
  </div>

  <div id="app-main" style="display: none;">
    
    <!-- Update Header: Logo on the right (larger), Req Admin and Upload buttons dynamic based on user role -->
    <header style="display: flex; gap: 15px; justify-content: flex-start; align-items: center; padding: 12px 15px; overflow-x: auto; white-space: nowrap;">
      
      <button class="btn btn-outline" onclick="openMembers(true)">Admins</button>
      <button class="btn btn-outline" onclick="openMembers(false)">Members</button>
      
      <a href="admin.html" class="btn btn-primary" id="btn-admin-panel" style="display:none;">Upload</a>
      <button id="btn-request-nav" class="btn btn-primary" style="display:none;" onclick="applyForAdmin()">Req Admin</button>

      <div style="display: flex; flex-direction: column; align-items: center; cursor: pointer; margin-left: auto;" onclick="window.location.href='profile.html'">
        <div class="user-avatar" id="nav-avatar" style="width: 40px; height: 40px; font-size: 16px;">U</div>
        <span style="font-size: 10px; color: var(--text-muted); margin-top: 2px; font-weight: 700;">view</span>
      </div>

    </header>

    <div class="wall-container" style="margin-bottom: 0; padding-bottom: 0;">
      <div style="position: relative;">
        <select id="category-filter" class="custom-input" style="cursor: pointer; appearance: none; font-weight: 600;">
          <option value="All">🌟 All Categories</option>
        </select>
        <svg style="position:absolute; right:15px; top:12px; pointer-events:none; color:var(--text-muted);" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>

    <main class="wall-container" id="feed-container">
      <div class="post-card" style="padding: 15px;">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
          <div class="skeleton skeleton-avatar" style="width: 35px; height: 35px;"></div>
          <div style="flex:1;"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text" style="width:40%;"></div></div>
        </div>
        <div class="skeleton skeleton-media"></div>
      </div>
    </main>
  </div>

  <div id="members-modal" class="modal" role="dialog">
    <div class="modal-content" style="max-height: 80vh;">
      <div class="modal-header">
        <h3 id="members-title" style="font-size: 16px;">Directory</h3>
        <button class="close-btn" onclick="closeModal('members-modal')" aria-label="Close">&times;</button>
      </div>
      <div class="comments-container" id="members-list" style="padding: 15px;">
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text" style="width: 80%;"></div>
      </div>
      <div style="padding: 15px; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; background: #f8fafc;">
        <button id="btn-apply-admin" class="btn btn-outline" style="display:none; width: 100%;">
          Request Admin Access
        </button>
      </div>
    </div>
  </div>

  <div id="comment-modal" class="modal" role="dialog">
    <div class="modal-content" style="height: 80vh;">
      <div class="modal-header">
        <h3 style="font-size: 16px;">Discussion</h3>
        <button class="close-btn" onclick="closeModal('comment-modal')" aria-label="Close">&times;</button>
      </div>
      <div class="comments-container" id="comment-list-container" style="flex: 1; padding: 15px;">
      </div>
      <div class="comment-input-box" style="padding: 12px 15px;">
        <input type="text" id="modal-comment-input" class="custom-input" style="margin-bottom: 0; border-radius: 20px;" placeholder="Write a comment...">
        <button class="btn btn-primary" id="modal-comment-submit" style="border-radius: 50%; padding: 10px; width: 40px; height: 40px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, setDoc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyApS9a6cxv7O0LMARD7IKOr-WEQAtlq9fI",
      authDomain: "mydata-81da6.firebaseapp.com",
      projectId: "mydata-81da6",
      storageBucket: "mydata-81da6.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const EMOJIS = ['👍', '❤️', '🔥', '😂', '😲'];
    let currentUser = localStorage.getItem('nt_user');
    let currentRole = localStorage.getItem('nt_role');
    let allPosts = [];
    let activeCommentPostId = null;

    window.showToast = function(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => { if(container.contains(toast)) toast.remove(); }, 3000);
    }

    window.openModal = function(id) { document.getElementById(id).style.display = 'flex'; }
    window.closeModal = function(id) { document.getElementById(id).style.display = 'none'; activeCommentPostId = null; }

    window.openMembers = function(adminsOnly) {
      document.getElementById('members-title').innerHTML = adminsOnly ? 'Admins List' : 'Members List';
      openModal('members-modal');
      loadMembers(!adminsOnly); 
    }

    if (currentUser && currentRole) showApp();

    // Updated showApp function
    function showApp() {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app-main').style.display = 'block';
      document.getElementById('nav-avatar').innerText = currentUser.charAt(0).toUpperCase();
      
      if(currentRole === 'user') { 
        document.getElementById('btn-apply-admin').style.display = 'block'; 
        document.getElementById('btn-request-nav').style.display = 'inline-flex'; 
      } else { 
        document.getElementById('btn-admin-panel').style.display = 'inline-flex'; 
      }
      
      loadCategories(); loadFeed();
    }

    async function handleAuth(isLogin) {
      const u = document.getElementById('auth-username').value.trim();
      const p = document.getElementById('auth-password').value.trim();
      
      if(!u || !p) return showToast("Username & Password required!", "error");
      
      try {
        const userRef = doc(db, "users", u); 
        const snap = await getDoc(userRef);

        if(u === 'siam' && p === '111111') {
          await setDoc(userRef, { password: p, role: 'main_admin', requestAdmin: false });
          localStorage.setItem('nt_user', u); localStorage.setItem('nt_role', 'main_admin');
          currentUser = u; currentRole = 'main_admin'; showApp(); return;
        }

        if(isLogin) {
          if(!snap.exists()) return showToast("Account not found!", "error");
          if(snap.data().password !== p) return showToast("Incorrect password!", "error");
          localStorage.setItem('nt_user', u); localStorage.setItem('nt_role', snap.data().role);
          currentUser = u; currentRole = snap.data().role; showApp();
        } else {
          if(snap.exists()) return showToast("Username taken!", "error");
          if(p.length < 5) return showToast("Password too short.", "error");
          await setDoc(userRef, { password: p, role: 'user', requestAdmin: false, createdAt: Date.now() });
          localStorage.setItem('nt_user', u); localStorage.setItem('nt_role', 'user');
          currentUser = u; currentRole = 'user'; showApp();
        }
      } catch (err) { showToast("Authentication failed.", "error"); }
    }

    document.getElementById('btn-login').addEventListener('click', () => handleAuth(true));
    document.getElementById('btn-register').addEventListener('click', () => handleAuth(false));

    // Unified function for Admin Request
    window.applyForAdmin = async function() {
      try {
        await updateDoc(doc(db, "users", currentUser), { requestAdmin: true });
        showToast("Admin request sent!", "success");
        
        // Update header button
        const navBtn = document.getElementById('btn-request-nav');
        if(navBtn) { navBtn.innerText = "Pending..."; navBtn.disabled = true; }
        
        // Update modal button
        const modalBtn = document.getElementById('btn-apply-admin');
        if(modalBtn) { modalBtn.innerText = "Request Pending..."; modalBtn.disabled = true; }
      } catch (e) { showToast("Failed to send request.", "error"); }
    };

    document.getElementById('btn-apply-admin').addEventListener('click', window.applyForAdmin);

    async function loadMembers(showAll) {
      const container = document.getElementById('members-list'); 
      container.innerHTML = '<div class="skeleton skeleton-text"></div>';
      
      try {
        const snap = await getDocs(collection(db, "users")); 
        let html = "";
        
        snap.forEach(doc => {
          let u = doc.data();
          let badgeLabel = u.role === 'main_admin' ? 'Chief' : (u.role === 'admin' ? 'Admin' : 'User');
          let icon = u.role === 'main_admin' ? '👑' : (u.role === 'admin' ? '🛡️' : '👤');
          
          if(showAll || u.role !== 'user') {
            html += `
              <div onclick="window.location.href='profile.html?user=${doc.id}'" style="display:flex; justify-content:space-between; padding: 12px; border-bottom: 1px solid var(--border-color); align-items: center; background: white; border-radius: 8px; margin-bottom: 6px; cursor:pointer; transition: 0.2s;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='white'">
                <div style="display:flex; align-items:center; gap:8px;">
                  <div class="user-avatar" style="width: 30px; height: 30px; font-size: 12px;">${doc.id.charAt(0).toUpperCase()}</div>
                  <strong style="font-size: 13px; color: var(--primary-color);">${doc.id}</strong>
                </div>
                <span class="badge badge-${u.role}">${icon} ${badgeLabel}</span>
              </div>`;
          }
        });
        container.innerHTML = html || "<p style='text-align:center; font-size:13px; color: var(--text-muted);'>No records found.</p>";
      } catch (e) { showToast("Failed to fetch directory.", "error"); }
    }

    async function loadCategories() {
      try {
        const filter = document.getElementById('category-filter');
        // Prevent duplicate loads
        filter.innerHTML = '<option value="All">🌟 All Categories</option>';
        const snap = await getDocs(collection(db, "categories"));
        snap.forEach(doc => { filter.innerHTML += `<option value="${doc.id}">📁 ${doc.id}</option>`; });
      } catch (e) {}
    }

    document.getElementById('category-filter').addEventListener('change', renderFeed);

    async function loadFeed() {
      try {
        const snap = await getDocs(collection(db, "posts")); 
        allPosts = [];
        snap.forEach(doc => allPosts.push({ id: doc.id, ...doc.data() }));
        allPosts.sort((a, b) => b.createdAt - a.createdAt); 
        renderFeed();
      } catch (err) { showToast("Failed to fetch feed.", "error"); }
    }

    function renderFeed() {
      const container = document.getElementById('feed-container');
      const selectedCategory = document.getElementById('category-filter').value;
      container.innerHTML = "";
      
      let filteredPosts = selectedCategory !== "All" ? allPosts.filter(p => p.category === selectedCategory) : allPosts;
      
      if(filteredPosts.length === 0) {
        container.innerHTML = `<p style="text-align:center; font-size:13px; color:#94a3b8; padding:30px;">No Content Found</p>`;
        return;
      }
      filteredPosts.forEach(post => { container.innerHTML += buildPostHTML(post); });
      attachPostEvents();
    }

    function buildPostHTML(post) {
      let mediaHtml = post.fileType.startsWith('video/') ? 
        `<video src="${post.fileUrl}" controls style="border-radius: 0; outline: none;"></video>` : 
        `<img src="${post.fileUrl}" loading="lazy" alt="${post.heading}">`;
        
      let reactsData = post.reactions || {}; 
      let myReact = post.userReactions ? post.userReactions[currentUser] : null;
      
      let reactionButtons = EMOJIS.map(emj => {
        let count = reactsData[emj] || 0; 
        let isActive = myReact === emj ? 'active' : '';
        return `<button class="react-btn ${isActive}" data-id="${post.id}" data-emoji="${emj}">${emj} <span>${count}</span></button>`;
      }).join('');
      
      let commentCount = (post.comments || []).length;
      let formattedDate = new Date(post.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

      return `
        <article class="post-card">
          <div class="post-header-sec">
            <div style="display:flex; gap:10px; align-items: flex-start;">
              <div class="user-avatar" style="width:36px; height:36px; font-size:14px; cursor:pointer;" onclick="window.location.href='profile.html?user=${post.uploaderName}'">${post.uploaderName.charAt(0).toUpperCase()}</div>
              <div>
                <span class="category-tag">${post.category || 'General'}</span>
                <h2 class="post-heading">${post.heading}</h2>
                <div class="uploader-info">
                  <span>by</span> <span class="uploader-name" onclick="window.location.href='profile.html?user=${post.uploaderName}'" style="cursor:pointer; text-decoration:underline;">${post.uploaderName}</span>
                  <span>•</span> <span>${formattedDate}</span>
                </div>
              </div>
            </div>
          </div>
          <div class="post-media">${mediaHtml}</div>
          <div class="post-body">
            <p class="post-caption">${post.caption}</p>
            <div class="action-bar">
              ${reactionButtons}
              <button class="comment-toggle-btn" onclick="openComments('${post.id}')" style="margin-left: auto;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                ${commentCount}
              </button>
            </div>
          </div>
        </article>
      `;
    }

    function attachPostEvents() {
      document.querySelectorAll('.react-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          try {
            const pid = btn.getAttribute('data-id'); const emj = btn.getAttribute('data-emoji');
            const pRef = doc(db, "posts", pid); const pData = (await getDoc(pRef)).data();
            let uReacts = pData.userReactions || {}; let rCounts = pData.reactions || { '👍':0, '❤️':0, '🔥':0, '😂':0, '😲':0 };
            let currentEmj = uReacts[currentUser];
            if(currentEmj === emj) { rCounts[emj]--; delete uReacts[currentUser]; } 
            else { if(currentEmj) rCounts[currentEmj]--; rCounts[emj] = (rCounts[emj]||0)+1; uReacts[currentUser] = emj; }
            await updateDoc(pRef, { reactions: rCounts, userReactions: uReacts }); loadFeed(); 
          } catch (e) { showToast("Failed to react.", "error"); }
        });
      });
    }

    window.openComments = async function(pid) { activeCommentPostId = pid; openModal('comment-modal'); renderCommentsInModal(pid); }

    async function renderCommentsInModal(pid) {
      const cList = document.getElementById('comment-list-container');
      cList.innerHTML = '<div class="skeleton skeleton-text"></div>';
      try {
        const comments = (await getDoc(doc(db, "posts", pid))).data().comments || [];
        if(comments.length === 0) { cList.innerHTML = `<p style="text-align:center; font-size:13px; color:#94a3b8;">No comments yet.</p>`; return; }
        cList.innerHTML = comments.map(c => {
          let roleClass = c.role === 'main_admin' ? 'comment-chief' : (c.role === 'admin' ? 'comment-admin' : 'comment-user');
          let badgeText = c.role !== 'user' ? `<span style="font-size:9px; background:var(--border-color); padding:2px 4px; border-radius:4px; margin-left:4px;">${c.role}</span>` : '';
          return `
            <div class="comment-item">
              <div style="display:flex; align-items:center; margin-bottom: 4px;">
                <div class="user-avatar" style="width:20px; height:20px; font-size:10px; margin-right:6px;">${c.user.charAt(0).toUpperCase()}</div>
                <span class="comment-author ${roleClass}">${c.user}${badgeText}</span>
              </div>
              <span class="${roleClass}" style="padding-left: 26px;">${c.text}</span>
            </div>`;
        }).join('');
        cList.scrollTop = cList.scrollHeight; 
      } catch (e) { cList.innerHTML = "<p style='color:red;'>Error</p>"; }
    }

    document.getElementById('modal-comment-submit').addEventListener('click', async () => {
      const input = document.getElementById('modal-comment-input'); const text = input.value.trim();
      if(text !== "" && activeCommentPostId) {
        try {
          await updateDoc(doc(db, "posts", activeCommentPostId), { comments: arrayUnion({ user: currentUser, role: currentRole, text: text }) });
          input.value = ""; await renderCommentsInModal(activeCommentPostId); loadFeed(); 
        } catch (e) { showToast("Failed to post.", "error"); }
      }
    });
  </script>
</body>
</html>
