<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Media Feed</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="name-modal" class="modal-overlay">
    <div class="modal-box">
      <h2><i class="fa-solid fa-user-circle"></i> Create Profile</h2>
      <p>Enter a username to like and comment on posts.</p>
      <input type="text" id="username-input" placeholder="e.g. John Doe" autocomplete="off">
      <button id="save-name-btn" class="btn primary-btn">Continue to Feed <i class="fa-solid fa-arrow-right"></i></button>
    </div>
  </div>

  <header>
    <div class="header-logo">
      <i class="fa-solid fa-play-circle logo-icon"></i>
      <h1>TubeFeed</h1>
    </div>
    <div class="header-actions">
      <div class="user-badge" id="user-display" onclick="openNameModal(true)" title="Change Name">
        <i class="fa-solid fa-user"></i> <span id="user-name-text">Guest</span>
      </div>
      <button onclick="location.reload()" class="icon-btn" title="Refresh Feed"><i class="fa-solid fa-rotate-right"></i></button>
      <a href="admin.html" class="icon-btn" title="Admin Panel"><i class="fa-solid fa-gear"></i></a>
    </div>
  </header>

  <main id="feed-container">
    <div class="loader-container">
      <i class="fa-solid fa-spinner fa-spin loader-icon"></i>
      <p>Loading premium content...</p>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyApS9a6cxv7O0LMARD7IKOr-WEQAtlq9fI",
      authDomain: "mydata-81da6.firebaseapp.com",
      projectId: "mydata-81da6",
      storageBucket: "mydata-81da6.firebasestorage.app",
      messagingSenderId: "577099961634",
      appId: "1:577099961634:web:7a37609ea325d67146417b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const feedContainer = document.getElementById('feed-container');
    const nameModal = document.getElementById('name-modal');
    
    let currentUserName = localStorage.getItem('tube_username');

    // Name Modal Logic
    window.openNameModal = function(isChange = false) {
      nameModal.style.display = 'flex';
      if(isChange && currentUserName) {
        document.getElementById('username-input').value = currentUserName;
      }
    }

    document.getElementById('save-name-btn').addEventListener('click', () => {
      const inputVal = document.getElementById('username-input').value.trim();
      if(inputVal) {
        currentUserName = inputVal;
        localStorage.setItem('tube_username', currentUserName);
        document.getElementById('user-name-text').innerText = currentUserName;
        nameModal.style.display = 'none';
        location.reload(); // রিলোড দিয়ে নতুন নামের লাইক স্ট্যাটাস আপডেট করা
      }
    });

    if (!currentUserName) {
      openNameModal();
    } else {
      document.getElementById('user-name-text').innerText = currentUserName;
    }

    // Toggle Comments visibility
    window.toggleComments = function(id) {
      const section = document.getElementById(`comment-section-${id}`);
      if(section.style.display === 'none' || section.style.display === '') {
        section.style.display = 'block';
      } else {
        section.style.display = 'none';
      }
    }

    async function loadPosts() {
      try {
        const querySnapshot = await getDocs(collection(db, "posts"));
        feedContainer.innerHTML = "";
        
        if(querySnapshot.empty) {
          feedContainer.innerHTML = "<div class='empty-state'><i class='fa-solid fa-video-slash'></i><p>No content available yet.</p></div>";
          return;
        }

        const posts = [];
        querySnapshot.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));
        posts.sort((a, b) => b.createdAt - a.createdAt);

        posts.forEach(post => {
          const postCard = document.createElement('div');
          postCard.className = 'post-card';

          let mediaHtml = "";
          if (post.fileType && post.fileType.startsWith('video/')) {
            mediaHtml = `<video src="${post.fileUrl}" controls controlsList="nodownload"></video>`;
          } else {
            mediaHtml = `<img src="${post.fileUrl}" alt="Post Image">`;
          }

          let commentsHtml = post.comments ? post.comments.map(c => `
            <div class="comment-item">
              <div class="comment-avatar"><i class="fa-solid fa-user"></i></div>
              <div class="comment-body">
                <span class="comment-author">${c.name}</span>
                <span class="comment-text">${c.text}</span>
              </div>
            </div>
          `).join('') : '';
          
          const likedUsers = post.likedUsers || [];
          const hasLiked = currentUserName ? likedUsers.includes(currentUserName) : false;

          postCard.innerHTML = `
            <div class="media-wrapper">
              ${mediaHtml}
            </div>
            <div class="post-details">
              <h3 class="post-caption">${post.caption || ''}</h3>
              
              <div class="action-bar">
                <button class="action-btn like-btn ${hasLiked ? 'active' : ''}" data-id="${post.id}">
                  <i class="fa-solid fa-thumbs-up"></i> <span id="like-count-${post.id}">${likedUsers.length}</span>
                </button>
                <button class="action-btn" onclick="toggleComments('${post.id}')">
                  <i class="fa-solid fa-comment"></i> Comments
                </button>
              </div>

              <div class="comment-section" id="comment-section-${post.id}" style="display: none;">
                <div class="comments-list" id="comment-list-${post.id}">
                  ${commentsHtml || '<p class="no-comments">Be the first to comment!</p>'}
                </div>
                <div class="comment-input-area">
                  <input type="text" id="input-${post.id}" placeholder="Add a public comment...">
                  <button class="send-btn submit-comment-btn" data-id="${post.id}"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
              </div>
            </div>
          `;
          feedContainer.appendChild(postCard);
        });

        // Like Logic
        document.querySelectorAll('.like-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            if(!currentUserName) return openNameModal();
            const id = btn.getAttribute('data-id');
            const countSpan = document.getElementById(`like-count-${id}`);
            let currentCount = parseInt(countSpan.innerText);

            if (btn.classList.contains('active')) {
              btn.classList.remove('active');
              countSpan.innerText = currentCount - 1;
              await updateDoc(doc(db, "posts", id), { likedUsers: arrayRemove(currentUserName) });
            } else {
              btn.classList.add('active');
              countSpan.innerText = currentCount + 1;
              await updateDoc(doc(db, "posts", id), { likedUsers: arrayUnion(currentUserName) });
            }
          });
        });

        // Comment Logic
        document.querySelectorAll('.submit-comment-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            if(!currentUserName) return openNameModal();
            const id = btn.getAttribute('data-id');
            const input = document.getElementById(`input-${id}`);
            const text = input.value.trim();
            
            if (text !== "") {
              const list = document.getElementById(`comment-list-${id}`);
              // Remove "Be the first" text if exists
              if(list.innerHTML.includes('no-comments')) list.innerHTML = ''; 

              const newComment = `
                <div class="comment-item">
                  <div class="comment-avatar"><i class="fa-solid fa-user"></i></div>
                  <div class="comment-body">
                    <span class="comment-author">${currentUserName}</span>
                    <span class="comment-text">${text}</span>
                  </div>
                </div>`;
              list.insertAdjacentHTML('beforeend', newComment);
              input.value = "";

              await updateDoc(doc(db, "posts", id), {
                comments: arrayUnion({ name: currentUserName, text: text })
              });
            }
          });
        });

      } catch (error) {
        feedContainer.innerHTML = `<div class='empty-state'><i class='fa-solid fa-triangle-exclamation'></i><p>Connection Error!</p></div>`;
      }
    }

    loadPosts();
  </script>
</body>
</html>
