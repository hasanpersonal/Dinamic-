<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-container">
      <a href="index.html" class="logo-link">
        <i class="fa-solid fa-play-css logo-icon"></i>
      </a>
      <a href="profile.html" class="header-profile-link" title="My Profile">
        <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop" alt="My Profile" class="avatar-nav">
      </a>
    </div>
  </header>

  <!-- MAIN FEED -->
  <main class="feed-container">
    
    <!-- POST CARD 1 -->
    <article class="post-card">
      <div class="post-header">
        <a href="profile.html?user=hasan&view=public" class="uploader-link">
          <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop" alt="Hasan" class="avatar-sm">
          <div class="uploader-info">
            <span class="uploader-name">Hasan <span class="badge chief">Chief Admin</span></span>
            <span class="post-time">2 hours ago</span>
          </div>
        </a>
      </div>

      <div class="media-container">
        <img src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=800&auto=format&fit=crop" alt="Post content" class="post-media">
      </div>

      <div class="post-actions">
        <button class="action-btn active"><i class="fa-solid fa-heart"></i> <span>245</span></button>
        <button class="action-btn" onclick="openComments()"><i class="fa-solid fa-comment"></i> <span>18</span></button>
      </div>

      <div class="post-caption">
        <p>Exploring the new updates of our platform! Let me know your thoughts. 🔥</p>
      </div>
    </article>

    <!-- POST CARD 2 -->
    <article class="post-card">
      <div class="post-header">
        <a href="profile.html?user=rakib&view=public" class="uploader-link">
          <img src="https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?w=100&auto=format&fit=crop" alt="Rakib" class="avatar-sm">
          <div class="uploader-info">
            <span class="uploader-name">Rakib <span class="badge admin">Admin</span></span>
            <span class="post-time">5 hours ago</span>
          </div>
        </a>
      </div>

      <div class="media-container">
        <video src="https://assets.mixkit.co/videos/preview/mixkit-vertical-shot-of-a-neon-sign-at-night-42259-large.mp4" controls class="post-media"></video>
      </div>

      <div class="post-actions">
        <button class="action-btn"><i class="fa-solid fa-heart"></i> <span>120</span></button>
        <button class="action-btn" onclick="openComments()"><i class="fa-solid fa-comment"></i> <span>5</span></button>
      </div>

      <div class="post-caption">
        <p>Night vibes in the city. #aesthetic #vlog</p>
      </div>
    </article>

  </main>

  <!-- FLOATING ACTION BUTTONS -->
  <div class="fab-container">
    <button class="fab-btn" onclick="openMembers()" title="Members List"><i class="fa-solid fa-users"></i></button>
    <button class="fab-btn primary" title="Upload New"><i class="fa-solid fa-plus"></i></button>
  </div>

  <!-- COMMENTS MODAL -->
  <div class="modal-overlay" id="commentsModal" onclick="closeModal(event, 'commentsModal')">
    <div class="modal-content comments-sheet">
      <div class="modal-header">
        <h3>Comments</h3>
        <button class="close-btn" onclick="document.getElementById('commentsModal').classList.remove('active')">&times;</button>
      </div>
      <div class="comments-body">
        <div class="comment-item">
          <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&auto=format&fit=crop" alt="User" class="avatar-xs">
          <div class="comment-text-box">
            <a href="profile.html?user=sara&view=public" class="member-profile-link"><strong>Sara:</strong></a> Awesome video, love the grading!
          </div>
        </div>
      </div>
      <div class="comment-input-area">
        <input type="text" placeholder="Write a comment..." class="comment-input">
        <button class="comment-send-btn"><i class="fa-solid fa-paper-plane"></i></button>
      </div>
    </div>
  </div>

  <!-- MEMBERS MODAL -->
  <div class="modal-overlay" id="membersModal" onclick="closeModal(event, 'membersModal')">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Platform Members</h3>
        <button class="close-btn" onclick="document.getElementById('membersModal').classList.remove('active')">&times;</button>
      </div>
      <div class="members-body">
        <a href="profile.html?user=hasan&view=public" class="member-item-link">
          <div class="member-item">
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop" alt="Hasan" class="avatar-sm">
            <div class="member-details">
              <span class="m-name">Hasan</span>
              <span class="badge chief">Chief Admin</span>
            </div>
            <i class="fa-solid fa-chevron-right arrow-icon"></i>
          </div>
        </a>
        <a href="profile.html?user=rakib&view=public" class="member-item-link">
          <div class="member-item">
            <img src="https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?w=100&auto=format&fit=crop" alt="Rakib" class="avatar-sm">
            <div class="member-details">
              <span class="m-name">Rakib</span>
              <span class="badge admin">Admin</span>
            </div>
            <i class="fa-solid fa-chevron-right arrow-icon"></i>
          </div>
        </a>
      </div>
    </div>
  </div>

  <script>
    function openComments() { document.getElementById('commentsModal').classList.add('active'); }
    function openMembers() { document.getElementById('membersModal').classList.add('active'); }
    function closeModal(e, modalId) {
      if(e.target === document.getElementById(modalId)) { document.getElementById(modalId).classList.remove('active'); }
    }
  </script>
</body>
</html>
