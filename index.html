<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeonTube - Feed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="auth-screen">
    <div class="auth-box">
      <h1>NeonTube</h1>
      <p style="margin-bottom: 20px; color: #94a3b8;">Login or Register to continue</p>
      <input type="text" id="auth-username" placeholder="Username (no spaces)">
      <input type="password" id="auth-password" placeholder="Password">
      <div class="auth-btns">
        <button id="btn-login" class="btn btn-outline">Login</button>
        <button id="btn-register" class="btn btn-cyan">Create Account</button>
      </div>
      <p id="auth-error" class="error-msg"></p>
    </div>
  </div>

  <div id="app-main" style="display: none;">
    <header>
      <div class="brand">NeonTube</div>
      <div class="header-right">
        <span class="user-badge" id="display-user"></span>
        <button class="btn btn-outline" onclick="document.getElementById('admin-list-modal').style.display='flex'">Admin List</button>
        <button class="btn btn-cyan" id="btn-apply-admin" style="display:none;">Be an Admin</button>
        <a href="admin.html" class="btn btn-pink" id="btn-admin-panel" style="display:none;">Studio</a>
        <button id="btn-logout" class="btn">Logout</button>
      </div>
    </header>

    <main id="feed-container">
      <p style="text-align: center;">Loading Neon Feed...</p>
    </main>
  </div>

  <div id="admin-list-modal" class="modal">
    <div class="modal-content">
      <h2 style="color: var(--accent-cyan); margin-bottom: 15px;">Official Admins</h2>
      <div id="admin-list-container">Loading...</div>
      <button class="btn btn-outline" style="margin-top: 15px; width: 100%;" onclick="document.getElementById('admin-list-modal').style.display='none'">Close</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, setDoc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyApS9a6cxv7O0LMARD7IKOr-WEQAtlq9fI",
      authDomain: "mydata-81da6.firebaseapp.com",
      projectId: "mydata-81da6",
      storageBucket: "mydata-81da6.firebasestorage.app",
      messagingSenderId: "577099961634",
      appId: "1:577099961634:web:7a37609ea325d67146417b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Emojis list
    const EMOJIS = ['👍', '❤️', '😂', '😲', '😢'];

    let currentUser = localStorage.getItem('nt_user');
    let currentRole = localStorage.getItem('nt_role');

    const authScreen = document.getElementById('auth-screen');
    const appMain = document.getElementById('app-main');
    const errorMsg = document.getElementById('auth-error');

    // Init Logic
    if (currentUser && currentRole) {
      showApp();
    }

    function showApp() {
      authScreen.style.display = 'none';
      appMain.style.display = 'block';
      document.getElementById('display-user').innerText = currentUser;
      
      if(currentRole === 'user') {
        document.getElementById('btn-apply-admin').style.display = 'block';
      } else {
        document.getElementById('btn-admin-panel').style.display = 'block';
      }
      loadFeed();
      loadAdminList();
    }

    // --- Authentication System ---
    document.getElementById('btn-register').addEventListener('click', async () => {
      const u = document.getElementById('auth-username').value.trim();
      const p = document.getElementById('auth-password').value.trim();
      if(!u || !p) return errorMsg.innerText = "Enter username and password!";
      
      const userRef = doc(db, "users", u);
      const snap = await getDoc(userRef);
      if(snap.exists()) return errorMsg.innerText = "Username already exists! Try logging in.";

      // Check main admin condition
      let role = 'user';
      if(u === 'imrul' && p === '123456') role = 'main_admin';

      await setDoc(userRef, { password: p, role: role, requestAdmin: false });
      localStorage.setItem('nt_user', u);
      localStorage.setItem('nt_role', role);
      currentUser = u; currentRole = role;
      showApp();
    });

    document.getElementById('btn-login').addEventListener('click', async () => {
      const u = document.getElementById('auth-username').value.trim();
      const p = document.getElementById('auth-password').value.trim();
      if(!u || !p) return errorMsg.innerText = "Enter username and password!";
      
      const userRef = doc(db, "users", u);
      const snap = await getDoc(userRef);
      if(!snap.exists()) return errorMsg.innerText = "Account not found. Create one!";
      
      const data = snap.data();
      if(data.password !== p) return errorMsg.innerText = "Wrong password!";
      
      localStorage.setItem('nt_user', u);
      localStorage.setItem('nt_role', data.role);
      currentUser = u; currentRole = data.role;
      showApp();
    });

    document.getElementById('btn-logout').addEventListener('click', () => {
      localStorage.clear(); location.reload();
    });

    // Apply for Admin
    document.getElementById('btn-apply-admin').addEventListener('click', async () => {
      await updateDoc(doc(db, "users", currentUser), { requestAdmin: true });
      alert("Admin request sent to Imrul (Main Admin)!");
      document.getElementById('btn-apply-admin').innerText = "Request Pending...";
    });

    // --- Feed Logic ---
    async function loadFeed() {
      const feedContainer = document.getElementById('feed-container');
      try {
        const querySnapshot = await getDocs(collection(db, "posts"));
        feedContainer.innerHTML = "";
        if(querySnapshot.empty) { feedContainer.innerHTML = "<p>No posts yet.</p>"; return; }

        const posts = [];
        querySnapshot.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));
        posts.sort((a, b) => b.createdAt - a.createdAt);

        posts.forEach(post => {
          const card = document.createElement('div');
          card.className = 'post-card';

          let mediaHtml = post.fileType.startsWith('video/') ? `<video src="${post.fileUrl}" controls></video>` : `<img src="${post.fileUrl}">`;

          // Format Reactions
          let reactsData = post.reactions || {};
          let myReact = post.userReactions ? post.userReactions[currentUser] : null;
          
          let reactionButtons = EMOJIS.map(emj => {
            let count = reactsData[emj] || 0;
            let isActive = myReact === emj ? 'active' : '';
            return `<button class="react-btn ${isActive}" data-id="${post.id}" data-emoji="${emj}">${emj} <span>${count}</span></button>`;
          }).join('');

          // Format Comments (Color coded by role)
          let commentsHtml = (post.comments || []).map(c => {
            let colorClass = (c.role === 'admin' || c.role === 'main_admin') ? 'admin-comment' : 'user-comment';
            return `<div class="comment-item"><span class="comment-author ${colorClass}">${c.user}:</span> <span class="user-comment">${c.text}</span></div>`;
          }).join('');

          card.innerHTML = `
            <h2 class="post-heading">${post.heading}</h2>
            <div class="post-media">${mediaHtml}</div>
            <p class="post-caption">${post.caption}</p>
            <div class="uploader-info">Uploaded by: <span class="uploader-name">${post.uploaderName}</span></div>
            
            <div class="reactions-bar" id="react-bar-${post.id}">${reactionButtons}</div>
            
            <div class="comments-section">
              <div class="comments-list" id="comment-list-${post.id}">${commentsHtml}</div>
              <div class="comment-input-area">
                <input type="text" id="input-${post.id}" placeholder="Write a comment...">
                <button class="btn btn-cyan submit-comment-btn" data-id="${post.id}">Post</button>
              </div>
            </div>
          `;
          feedContainer.appendChild(card);
        });

        // Reaction Events
        document.querySelectorAll('.react-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const pid = btn.getAttribute('data-id');
            const emj = btn.getAttribute('data-emoji');
            
            // Get post fresh data
            const pRef = doc(db, "posts", pid);
            const pSnap = await getDoc(pRef);
            let pData = pSnap.data();
            let uReacts = pData.userReactions || {};
            let rCounts = pData.reactions || { '👍':0, '❤️':0, '😂':0, '😲':0, '😢':0 };

            let currentEmj = uReacts[currentUser];

            if(currentEmj === emj) {
              // Remove react
              rCounts[emj]--;
              delete uReacts[currentUser];
            } else {
              // Add or Change react
              if(currentEmj) rCounts[currentEmj]--; // Remove old
              rCounts[emj] = (rCounts[emj] || 0) + 1; // Add new
              uReacts[currentUser] = emj;
            }

            await updateDoc(pRef, { reactions: rCounts, userReactions: uReacts });
            loadFeed(); // Reload to update UI
          });
        });

        // Comment Events
        document.querySelectorAll('.submit-comment-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const pid = btn.getAttribute('data-id');
            const input = document.getElementById(`input-${pid}`);
            if(input.value.trim() !== "") {
              await updateDoc(doc(db, "posts", pid), {
                comments: arrayUnion({ user: currentUser, role: currentRole, text: input.value.trim() })
              });
              input.value = "";
              loadFeed();
            }
          });
        });

      } catch (err) { console.error(err); }
    }

    // Load Admin List
    async function loadAdminList() {
      const container = document.getElementById('admin-list-container');
      const usersSnap = await getDocs(collection(db, "users"));
      container.innerHTML = "";
      usersSnap.forEach(uDoc => {
        const u = uDoc.data();
        if(u.role === 'admin' || u.role === 'main_admin') {
          let roleTag = u.role === 'main_admin' ? '(Main Admin)' : '(Admin)';
          container.innerHTML += `<div class="admin-list-item"><span>${uDoc.id}</span> <span style="color:var(--accent-pink);">${roleTag}</span></div>`;
        }
      });
    }
  </script>
</body>
</html>
