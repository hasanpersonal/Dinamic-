<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bright Tube - Wall</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="auth-screen" class="auth-wrapper">
    <div class="auth-box">
      <h1 style="color: var(--primary-color); margin-bottom: 5px;">Tube Wall</h1>
      <p style="color: var(--text-muted); margin-bottom: 20px;">Join to explore</p>
      
      <input type="text" id="auth-username" placeholder="Username">
      <input type="password" id="auth-password" placeholder="Password">
      
      <div style="display: flex; gap: 10px; flex-direction: column;">
        <button id="btn-login" class="btn btn-primary">Login</button>
        <button id="btn-register" class="btn btn-outline">Create Account</button>
      </div>
      <p id="auth-error" style="color: red; margin-top: 15px; font-size: 14px;"></p>
    </div>
  </div>

  <div id="app-main" style="display: none;">
    <header>
      <div class="brand">Tube Wall</div>
      <div class="header-right">
        <span class="user-badge" id="display-user"></span>
        <button class="btn btn-outline" id="btn-apply-admin" style="display:none;">Request Admin</button>
        <a href="admin.html" class="btn btn-primary" id="btn-admin-panel" style="display:none;">+ Upload</a>
        <button id="btn-logout" class="btn btn-outline">Logout</button>
      </div>
    </header>

    <main class="wall-container" id="feed-container">
      <p style="text-align: center; padding: 20px;">Loading posts...</p>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, setDoc, getDoc, updateDoc, arrayUnion, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyApS9a6cxv7O0LMARD7IKOr-WEQAtlq9fI",
      authDomain: "mydata-81da6.firebaseapp.com",
      projectId: "mydata-81da6",
      storageBucket: "mydata-81da6.firebasestorage.app",
      messagingSenderId: "577099961634",
      appId: "1:577099961634:web:7a37609ea325d67146417b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const EMOJIS = ['👍', '❤️', '😂', '😲', '😢'];
    let currentUser = localStorage.getItem('nt_user');
    let currentRole = localStorage.getItem('nt_role');

    if (currentUser && currentRole) showApp();

    function showApp() {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app-main').style.display = 'block';
      document.getElementById('display-user').innerText = `${currentUser}`;
      
      if(currentRole === 'user') {
        document.getElementById('btn-apply-admin').style.display = 'inline-block';
      } else {
        document.getElementById('btn-admin-panel').style.display = 'inline-block';
      }
      loadFeed();
    }

    async function handleAuth(isLogin) {
      const u = document.getElementById('auth-username').value.trim();
      const p = document.getElementById('auth-password').value.trim();
      const err = document.getElementById('auth-error');
      if(!u || !p) return err.innerText = "Username & Password required!";
      
      const userRef = doc(db, "users", u);
      const snap = await getDoc(userRef);

      // Force Siam to be Main Admin
      if(u === 'siam' && p === '111111') {
        await setDoc(userRef, { password: p, role: 'main_admin', requestAdmin: false });
        localStorage.setItem('nt_user', u);
        localStorage.setItem('nt_role', 'main_admin');
        currentUser = u; currentRole = 'main_admin';
        showApp();
        return;
      }

      if(isLogin) {
        if(!snap.exists()) return err.innerText = "Account not found!";
        if(snap.data().password !== p) return err.innerText = "Wrong password!";
        localStorage.setItem('nt_user', u);
        localStorage.setItem('nt_role', snap.data().role);
        currentUser = u; currentRole = snap.data().role;
        showApp();
      } else {
        if(snap.exists()) return err.innerText = "Username already taken!";
        await setDoc(userRef, { password: p, role: 'user', requestAdmin: false });
        localStorage.setItem('nt_user', u);
        localStorage.setItem('nt_role', 'user');
        currentUser = u; currentRole = 'user';
        showApp();
      }
    }

    document.getElementById('btn-login').addEventListener('click', () => handleAuth(true));
    document.getElementById('btn-register').addEventListener('click', () => handleAuth(false));
    document.getElementById('btn-logout').addEventListener('click', () => { localStorage.clear(); location.reload(); });

    document.getElementById('btn-apply-admin').addEventListener('click', async () => {
      await updateDoc(doc(db, "users", currentUser), { requestAdmin: true });
      alert("Admin request sent!");
      document.getElementById('btn-apply-admin').innerText = "Pending...";
    });

    // --- Delete Function Attached to Window ---
    window.deletePost = async function(pid) {
      if(confirm("Are you sure you want to delete this post?")) {
        try {
          await deleteDoc(doc(db, "posts", pid));
          loadFeed(); // Reload feed after delete
        } catch (e) {
          alert("Error deleting post!");
        }
      }
    }

    async function loadFeed() {
      const container = document.getElementById('feed-container');
      try {
        const querySnapshot = await getDocs(collection(db, "posts"));
        container.innerHTML = "";
        if(querySnapshot.empty) return container.innerHTML = "<p style='text-align:center;'>No posts found.</p>";

        const posts = [];
        querySnapshot.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));
        posts.sort((a, b) => b.createdAt - a.createdAt);

        posts.forEach(post => {
          const card = document.createElement('div');
          card.className = 'post-card';
          
          let mediaHtml = post.fileType.startsWith('video/') ? `<video src="${post.fileUrl}" controls></video>` : `<img src="${post.fileUrl}">`;
          
          // Show delete button logic
          let deleteBtnHtml = "";
          if(currentRole === 'main_admin' || post.uploaderName === currentUser) {
            deleteBtnHtml = `<button class="btn-delete" onclick="deletePost('${post.id}')">Delete</button>`;
          }

          let reactsData = post.reactions || {};
          let myReact = post.userReactions ? post.userReactions[currentUser] : null;
          
          let reactionButtons = EMOJIS.map(emj => {
            let count = reactsData[emj] || 0;
            let isActive = myReact === emj ? 'active' : '';
            return `<button class="react-btn ${isActive}" data-id="${post.id}" data-emoji="${emj}">${emj} <span>${count}</span></button>`;
          }).join('');

          let commentsHtml = (post.comments || []).map(c => {
            let isAdmin = (c.role === 'admin' || c.role === 'main_admin');
            return `<div class="comment-item">
              <span class="comment-author ${isAdmin ? 'admin-comment' : ''}">${c.user}:</span> 
              <span>${c.text}</span>
            </div>`;
          }).join('');

          card.innerHTML = `
            <div class="post-header-sec">
              <div>
                <h2 class="post-heading">${post.heading}</h2>
                <div class="uploader-info">Uploaded by: <span class="uploader-name">${post.uploaderName}</span></div>
              </div>
              ${deleteBtnHtml}
            </div>
            <div class="post-media">${mediaHtml}</div>
            <div class="post-body">
              <p class="post-caption">${post.caption}</p>
              <div class="reactions-bar">${reactionButtons}</div>
              <div class="comments-list" id="comment-list-${post.id}">${commentsHtml}</div>
              <div class="comment-input-area">
                <input type="text" id="input-${post.id}" placeholder="Add a comment...">
                <button class="btn btn-primary submit-comment-btn" data-id="${post.id}">Post</button>
              </div>
            </div>
          `;
          container.appendChild(card);
        });

        // Reaction Events
        document.querySelectorAll('.react-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const pid = btn.getAttribute('data-id');
            const emj = btn.getAttribute('data-emoji');
            const pRef = doc(db, "posts", pid);
            const pData = (await getDoc(pRef)).data();
            
            let uReacts = pData.userReactions || {};
            let rCounts = pData.reactions || { '👍':0, '❤️':0, '😂':0, '😲':0, '😢':0 };
            let currentEmj = uReacts[currentUser];

            if(currentEmj === emj) { rCounts[emj]--; delete uReacts[currentUser]; } 
            else { if(currentEmj) rCounts[currentEmj]--; rCounts[emj] = (rCounts[emj]||0)+1; uReacts[currentUser] = emj; }

            await updateDoc(pRef, { reactions: rCounts, userReactions: uReacts });
            loadFeed();
          });
        });

        // Comment Events
        document.querySelectorAll('.submit-comment-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const pid = btn.getAttribute('data-id');
            const input = document.getElementById(`input-${pid}`);
            if(input.value.trim() !== "") {
              await updateDoc(doc(db, "posts", pid), {
                comments: arrayUnion({ user: currentUser, role: currentRole, text: input.value.trim() })
              });
              loadFeed();
            }
          });
        });

      } catch (err) { console.error(err); }
    }
  </script>
</body>
</html>
