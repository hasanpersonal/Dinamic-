<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | Content Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="toast-container"></div>

  <header style="display: flex; justify-content: space-between; align-items: center; padding: 12px 5%;">
    <div class="brand" id="header-brand" style="font-size: 18px;">Profile</div>
    <div class="header-right" style="display: flex; gap: 8px;">
      <a href="admin.html" class="btn btn-primary" id="btn-prof-upload" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload
      </a>
      <a href="index.html" class="btn btn-outline">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </a>
    </div>
  </header>

  <div class="wall-container">
    
    <div class="profile-header">
      <div class="profile-avatar-lg" id="prof-avatar">?</div>
      <h2 id="prof-name" style="font-size: 22px; font-weight: 800; margin-bottom: 8px; color: var(--primary-color);">Loading...</h2>
      <div style="display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;">
        <span id="prof-badge" class="badge">Badge</span>
      </div>
    </div>

    <div id="security-section" class="post-card" style="padding: 20px;">
      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 15px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:#4f46e5;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <h3 style="font-size: 15px; font-weight: 800;">Account Security</h3>
      </div>
      <div style="background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color);">
        <label style="font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; display: block;">New Password</label>
        <div style="display: flex; gap: 8px;">
          <input type="password" id="new-password" class="custom-input" style="margin-bottom: 0;" placeholder="Min 5 characters">
          <button id="btn-change-pass" class="btn btn-primary" style="white-space: nowrap;">Update</button>
        </div>
      </div>
    </div>

    <div id="my-posts-section" class="post-card" style="padding: 20px; display: none;">
      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 15px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:#f97316;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        <h3 style="font-size: 15px; font-weight: 800;">Published Content</h3>
      </div>
      <div id="my-posts-container" style="max-height: 300px; overflow-y: auto; padding-right: 5px;">
        <div class="skeleton skeleton-text"></div>
      </div>
    </div>

    <div id="logout-section" style="margin-top: 25px; text-align: center;">
      <button id="btn-logout" class="btn btn-danger" style="width: 100%;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 5px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out Securely
      </button>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, updateDoc, collection, getDocs, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyApS9a6cxv7O0LMARD7IKOr-WEQAtlq9fI",
      authDomain: "mydata-81da6.firebaseapp.com",
      projectId: "mydata-81da6",
      storageBucket: "mydata-81da6.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const currentUser = localStorage.getItem('nt_user');
    const currentRole = localStorage.getItem('nt_role');

    if(!currentUser) { window.location.replace("index.html"); }

    const urlParams = new URLSearchParams(window.location.search);
    const targetUser = urlParams.get('user') || currentUser;
    const isOwnProfile = targetUser === currentUser;

    window.showToast = function(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => { if(container.contains(toast)) toast.remove(); }, 3000);
    }

    if(!isOwnProfile) {
      document.getElementById('security-section').style.display = 'none';
      document.getElementById('logout-section').style.display = 'none';
      document.getElementById('header-brand').innerText = `${targetUser}'s Profile`;
    } else {
      document.getElementById('header-brand').innerText = `My Account`;
      if(currentRole !== 'user') {
        document.getElementById('btn-prof-upload').style.display = 'inline-flex';
      }
    }

    async function loadProfileInfo() {
      if(isOwnProfile) {
        setBadges(currentRole);
        if(currentRole !== 'user') {
          document.getElementById('my-posts-section').style.display = 'block';
          loadPosts(targetUser);
        }
      } else {
        try {
          const userSnap = await getDoc(doc(db, "users", targetUser));
          if(userSnap.exists()) {
             let foreignRole = userSnap.data().role;
             setBadges(foreignRole);
             if(foreignRole !== 'user') {
                document.getElementById('my-posts-section').style.display = 'block';
                loadPosts(targetUser);
             }
          } else {
             showToast("User not found!", "error");
          }
        } catch(e) { console.error(e); }
      }
    }

    function setBadges(role) {
       document.getElementById('prof-name').innerText = `@${targetUser}`;
       document.getElementById('prof-avatar').innerText = targetUser.charAt(0).toUpperCase();
       let badgeLabel = role === 'main_admin' ? 'Chief' : (role === 'admin' ? 'Admin' : 'User');
       let icon = role === 'main_admin' ? '👑' : (role === 'admin' ? '🛡️' : '👤');
       let badgeEl = document.getElementById('prof-badge');
       badgeEl.innerHTML = `${icon} ${badgeLabel}`;
       badgeEl.className = `badge badge-${role}`;
    }

    async function loadPosts(username) {
      const container = document.getElementById('my-posts-container');
      try {
        const snap = await getDocs(collection(db, "posts"));
        let html = "";
        
        snap.forEach(doc => {
          let p = doc.data();
          if(p.uploaderName === username) {
            let deleteBtn = isOwnProfile ? `<button class="btn btn-danger" style="padding: 6px 10px; font-size: 11px;" onclick="deletePost('${doc.id}')">Delete</button>` : '';
            html += `
              <div style="display:flex; justify-content:space-between; align-items:center; padding: 12px; background: white; margin-bottom: 8px; border-radius: 8px; border: 1px solid var(--border-color);">
                <div style="font-size: 13px; font-weight:700; overflow: hidden; text-overflow: ellipsis; color:var(--primary-color);">${p.heading}</div>
                ${deleteBtn}
              </div>`;
          }
        });
        container.innerHTML = html || `<p style="text-align:center; font-size: 12px; color: var(--text-muted); padding: 15px;">No content found.</p>`;
      } catch (e) { container.innerHTML = "<p style='color:red;'>Failed to load.</p>"; }
    }

    window.deletePost = async function(pid) {
      if(confirm("Are you sure you want to delete this post?")) {
        try {
          await deleteDoc(doc(db, "posts", pid));
          showToast("Deleted.", "success");
          loadPosts(targetUser); 
        } catch (e) { showToast("Deletion failed.", "error"); }
      }
    }

    document.getElementById('btn-change-pass').addEventListener('click', async () => {
      const np = document.getElementById('new-password').value.trim();
      if(np.length < 5) return showToast("Min 5 characters!", "error"); 
      try {
        await updateDoc(doc(db, "users", currentUser), { password: np });
        showToast("Password updated!", "success");
        document.getElementById('new-password').value = ""; 
      } catch (e) { showToast("Failed.", "error"); } 
    });

    document.getElementById('btn-logout').addEventListener('click', () => { 
      localStorage.clear(); window.location.replace("index.html"); 
    });

    // Initialize
    loadProfileInfo();
  </script>
</body>
</html>
