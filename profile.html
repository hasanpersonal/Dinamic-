<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Profile specific styles */
    .profile-header { text-align: center; padding: 30px 16px; background: var(--bg-card); border-bottom: 1px solid var(--border-color); }
    .profile-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent-color); margin-bottom: 12px; }
    .profile-name { font-size: 20px; font-weight: 700; margin-bottom: 5px; }
    .settings-section { max-width: var(--max-width-feed); margin: 20px auto; padding: 0 16px; }
    .settings-card { background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid var(--border-color); }
    .settings-card h3 { margin-bottom: 15px; font-size: 16px; }
    .input-group { margin-bottom: 12px; }
    .input-group input { width: 100%; padding: 10px 14px; border: 1px solid var(--border-color); border-radius: 8px; outline: none; }
    .btn-save { background: var(--accent-color); color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="header-container">
      <a href="index.html" class="logo-link"><i class="fa-solid fa-arrow-left logo-icon"></i></a>
      <span style="font-weight: 600;">Profile</span>
      <div style="width: 24px;"></div>
    </div>
  </header>

  <div class="profile-header">
    <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=200&auto=format&fit=crop" alt="Profile" class="profile-avatar">
    <div class="profile-name" id="display-name">Hasan</div>
    <span class="badge chief" id="display-badge">Chief Admin</span>
  </div>

  <!-- PASSWORD CHANGE SECTION (Will be hidden for public view) -->
  <div class="settings-section" id="password-section">
    <div class="settings-card">
      <h3><i class="fa-solid fa-lock"></i> Change Password</h3>
      <div class="input-group">
        <input type="password" placeholder="Current Password">
      </div>
      <div class="input-group">
        <input type="password" placeholder="New Password">
      </div>
      <button class="btn-save">Update Password</button>
    </div>
  </div>

  <script>
    // Logic to hide password section if viewing someone else's profile
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('view') === 'public') {
      const passwordSection = document.getElementById('password-section');
      if (passwordSection) {
        passwordSection.style.display = 'none'; // Hides the password settings
      }
      
      // Update name based on URL just for demonstration
      const user = urlParams.get('user');
      if(user) {
        document.getElementById('display-name').innerText = user.charAt(0).toUpperCase() + user.slice(1);
        if(user === 'rakib') document.getElementById('display-badge').className = 'badge admin';
      }
    }
  </script>

</body>
</html>
