<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Profile | Creator Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="toast-container"></div>

  <header>
    <div class="brand">My Account</div>
    <div class="header-right">
      <a href="index.html" class="btn btn-outline">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:5px;"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Feed
      </a>
    </div>
  </header>

  <div class="wall-container">
    
    <!-- Profile Info Header -->
    <div class="profile-header">
      <div class="profile-avatar-lg" id="prof-avatar">U</div>
      <h2 id="prof-name" style="font-size: 26px; font-weight: 800; margin-bottom: 10px; color: var(--primary-color);">Username</h2>
      <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
        <span id="prof-badge" class="badge" style="font-size: 14px; padding: 6px 14px;">Badge</span>
        <span class="badge badge-user" style="font-size: 14px; padding: 6px 14px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Active Member
        </span>
      </div>
    </div>

    <!-- Security Options -->
    <div class="post-card" style="padding: 25px;">
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
        <div style="background: #e0e7ff; padding: 8px; border-radius: 8px; color: #4f46e5;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h3 style="font-size: 18px; font-weight: 800;">Account Security</h3>
      </div>
      
      <div style="background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 15px;">
        <label style="font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; display: block;">New Password</label>
        <div style="display: flex; gap: 10px;">
          <input type="password" id="new-password" class="custom-input" style="margin-bottom: 0;" placeholder="Minimum 5 characters required">
          <button id="btn-change-pass" class="btn btn-primary" style="white-space: nowrap;">Update Key</button>
        </div>
      </div>
    </div>

    <!-- Content Management (Admins Only) -->
    <div id="my-posts-section" class="post-card" style="padding: 25px; display: none;">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
        <div style="display: flex; align-items: center; gap: 10px;">
          <div style="background: #ffedd5; padding: 8px; border-radius: 8px; color: #f97316;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
          </div>
          <h3 style="font-size: 18px; font-weight: 800;">Content Manager</h3>
        </div>
        <span class="badge badge-main_admin" style="font-size: 10px;">Admin Zone</span>
      </div>
      
      <div id="my-posts-container" style="max-height: 400px; overflow-y: auto; padding-right: 5px;">
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text" style="width: 80%;"></div>
      </div>
    </div>

    <!-- Danger Zone -->
    <div style="margin-top: 30px; text-align: center;">
      <button id="btn-logout" class="btn btn-danger" style="width: 100%; padding: 16px; font-size: 16px; font-weight: 700; border-radius: var(--radius-md);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 5px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out Securely
      </button>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, updateDoc, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyApS9a6cxv7O0LMARD7IKOr-WEQAtlq9fI",
      authDomain: "mydata-81da6.firebaseapp.com",
      projectId: "mydata-81da6",
      storageBucket: "mydata-81da6.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const currentUser = localStorage.getItem('nt_user');
    const currentRole = localStorage.getItem('nt_role');

    // Strict redirect for unauthenticated access
    if(!currentUser) { 
      window.location.replace("index.html"); 
    }

    // Toast Functionality
    window.showToast = function(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => { if(container.contains(toast)) toast.remove(); }, 3000);
    }

    // Populate Initial UI Data
    document.getElementById('prof-name').innerText = `@${currentUser}`;
    document.getElementById('prof-avatar').innerText = currentUser.charAt(0).toUpperCase();
    
    let badgeLabel = currentRole === 'main_admin' ? 'Chief Administrator' : (currentRole === 'admin' ? 'System Admin' : 'Standard User');
    let icon = currentRole === 'main_admin' ? '👑' : (currentRole === 'admin' ? '🛡️' : '👤');
    let badgeEl = document.getElementById('prof-badge');
    badgeEl.innerHTML = `${icon} ${badgeLabel}`;
    badgeEl.className = `badge badge-${currentRole}`;

    // Admin Specific Content Loading
    if(currentRole !== 'user') {
      document.getElementById('my-posts-section').style.display = 'block';
      loadMyPosts();
    }

    async function loadMyPosts() {
      const container = document.getElementById('my-posts-container');
      try {
        const snap = await getDocs(collection(db, "posts"));
        let html = "";
        
        snap.forEach(doc => {
          let p = doc.data();
          if(p.uploaderName === currentUser) {
            let mediaTypeIcon = p.fileType.startsWith('video/') ? 
              '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>' : 
              '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>';
              
            html += `
              <div style="display:flex; justify-content:space-between; align-items:center; padding: 14px; background: white; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); transition: 0.2s;">
                <div style="display:flex; align-items:center; gap:12px; overflow: hidden;">
                  <div style="color:var(--text-light);">${mediaTypeIcon}</div>
                  <div style="font-size: 15px; font-weight:700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color:var(--primary-color);">${p.heading}</div>
                </div>
                <button class="btn btn-danger" style="padding: 8px 14px; font-size: 12px; display:flex; align-items:center; gap:5px;" onclick="deletePost('${doc.id}')">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                  Delete
                </button>
              </div>`;
          }
        });
        container.innerHTML = html || `
          <div style="text-align:center; padding:30px; border: 2px dashed var(--border-color); border-radius: 12px;">
            <p style="color: var(--text-muted); font-size: 14px; font-weight:600;">You haven't published any content yet.</p>
          </div>`;
      } catch (e) {
        container.innerHTML = "<p style='color:red;'>Failed to load personal content.</p>";
      }
    }

    // Attach deletion globally
    window.deletePost = async function(pid) {
      if(confirm("⚠️ System Warning: This action is permanent. Are you sure you want to delete this post?")) {
        try {
          await deleteDoc(doc(db, "posts", pid));
          showToast("Content permanently removed from server.", "success");
          loadMyPosts(); 
        } catch (e) {
          showToast("Deletion failed. Permissions error.", "error");
        }
      }
    }

    // Password Update Logic
    document.getElementById('btn-change-pass').addEventListener('click', async () => {
      const np = document.getElementById('new-password').value.trim();
      const btn = document.getElementById('btn-change-pass');
      
      if(np.length < 5) { 
        showToast("Security Policy: Password must be at least 5 characters!", "error"); 
        return; 
      }
      
      try {
        btn.innerText = "Securing..."; btn.disabled = true;
        await updateDoc(doc(db, "users", currentUser), { password: np });
        
        showToast("Authentication key updated successfully!", "success");
        document.getElementById('new-password').value = ""; 
      } catch (e) {
        showToast("Database update failed.", "error");
      } finally {
        btn.innerText = "Update Key"; btn.disabled = false;
      }
    });

    // Session Termination
    document.getElementById('btn-logout').addEventListener('click', () => { 
      localStorage.clear(); 
      window.location.replace("index.html"); 
    });
  </script>
</body>
</html>
